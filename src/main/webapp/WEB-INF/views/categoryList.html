<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>카테고리 목록</title>
</head>
<body>
<h1>카테고리 목록</h1>

<p th:if="${successMessage}" th:text="${successMessage}"></p>
<p th:if="${errorMessage}" th:text="${errorMessage}"></p>

<a th:href="@{/categories/create}">새 카테고리 등록</a>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>카테고리명</th>
        <th>작업</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="cat : ${categories}">
        <td th:text="${cat.id}"></td>
        <td th:text="${cat.name}"></td>
        <td>
            <form th:action="@{/categories/{id}/delete(id=${cat.id})}" method="post">
                <button type="submit">삭제</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<footer style="margin-top: 40px; padding: 20px; border-top: 1px solid #ccc; background-color: #f9f9f9; font-size: 0.9em; color: #666;">
    <p th:text="'실습 수행 일시: ' + ${#temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 (E) a hh:mm:ss')} + ' | 학번: 2171180 | 성명: 박영호'">
        실습 수행 일시: 2026년 04월 xx일 (x) 오후 xx:xx:xx | 학번: 2171180 | 성명: 박영호
    </p>
</footer>
</body>
</html>
